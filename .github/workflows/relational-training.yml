name: Relational CI/Trainer

on:
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual runs from the Actions tab

permissions:
  contents: read
  pull-requests: write   # Needed for the bot to comment on PRs

jobs:
  build-and-train:
    runs-on: ubuntu-latest
    timeout-minutes: 5     # Safety net for free runners

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Relational Trainer
        run: python src/train_relational.py

      - name: Post Result as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
